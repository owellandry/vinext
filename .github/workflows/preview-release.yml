name: Preview Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: bun
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bunx pkg-pr-new publish './packages/openvite'
